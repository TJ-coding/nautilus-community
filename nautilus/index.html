<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <link rel="icon" href="/favicon.ico">
    <link rel="icon" type="image/png" href="/src/assets/logo.png">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nautilus Agent — AI for Scientists</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Jost:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.js"></script>
    <script type="text/javascript">
    // Handle SPA redirect tokens from 404.html
    (function() {
      var redirect = window.location.search.match(/[?&]redirect=([^&]+)/);
      if (!redirect) return;
      var target = decodeURIComponent(redirect[1]);
      var base = window.location.pathname.replace(/\/$/, '');
      if (target.charAt(0) !== '/') base += '/';
      var cleanSearch = window.location.search.replace(/[?&]redirect=[^&]+/, '').replace(/^\?/, '');
      var newUrl = window.location.origin + base + target + (cleanSearch ? '?' + cleanSearch : '') + window.location.hash;
      if (newUrl !== window.location.href) {
        window.history.replaceState(null, '', newUrl);
      }
    })();
  </script>
</body>
</html>
